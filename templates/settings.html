{% extends "base.html" %}

{% block title %}Settings — Vivah Samiti Scraper{% endblock %}

{% block content %}
<section class="card">
  <h2>Login Settings</h2>
  <p>Your 10-digit mobile number is used as the password on <code>login.php</code>.</p>

  <form id="settings-form" class="form-grid">
    <label>
      Mobile Number
      <input type="text" id="mobile" name="mobile" value="{{ config.mobile }}" placeholder="9310520635" maxlength="10">
    </label>
    <label>
      PHPSESSID (optional fallback)
      <input type="text" id="phpsessid" name="phpsessid" value="{{ config.phpsessid }}" placeholder="Manual session cookie">
    </label>
    <label>
      Comparison Baseline File (optional)
      <input type="text" id="baseline_file" name="baseline_file" value="{{ config.baseline_file }}" placeholder="full_2026-06-13_120000.xlsx">
    </label>
    <div class="actions">
      <button type="submit" class="btn btn-primary">Save Settings</button>
      <button type="button" id="test-login-btn" class="btn btn-secondary">Test Login</button>
    </div>
  </form>
  <p id="settings-status" class="status-text"></p>
</section>

<section id="test-result" class="card hidden">
  <h2>Test Result</h2>
  <pre id="test-output"></pre>
</section>
{% endblock %}

{% block scripts %}
<script>
  initSettings();
</script>
{% endblock %}
